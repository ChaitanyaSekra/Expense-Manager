services:
  - type: web
    name: paisa-budget
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python generate_icons.py
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/budget.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
